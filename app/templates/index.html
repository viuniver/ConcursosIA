<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConcursosIA — Mapa de Vagas</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      background: #f1f3f4;
      color: #202124;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      height: 56px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
      z-index: 1000;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .header-logo { display: flex; align-items: center; gap: 8px; }
    .header-logo-icon {
      width: 32px; height: 32px;
      background: #1a73e8;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-size: 14px;
    }
    header h1 { font-size: 17px; font-weight: 600; color: #202124; }
    header .subtitle { font-size: 11px; color: #80868b; }
    .header-stats {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }
    .stat-pill {
      background: #f1f3f4;
      border: 1px solid #e0e0e0;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      color: #5f6368;
    }
    .stat-pill strong { color: #1a73e8; font-weight: 600; }

    /* ── Layout ── */
    .body-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 300px;
      min-width: 300px;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width .25s ease, min-width .25s ease;
      box-shadow: 2px 0 8px rgba(0,0,0,.06);
      z-index: 10;
    }
    #sidebar.collapsed { width: 0; min-width: 0; overflow: hidden; }

    .sidebar-header {
      padding: 14px 16px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: #fff;
    }
    .sidebar-header span { font-weight: 600; color: #202124; font-size: 13px; }

    .btn-icon {
      background: none;
      border: none;
      color: #80868b;
      cursor: pointer;
      padding: 5px;
      border-radius: 50%;
      font-size: 15px;
      line-height: 1;
      transition: background .15s, color .15s;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-icon:hover { background: #f1f3f4; color: #202124; }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .sidebar-body::-webkit-scrollbar { width: 5px; }
    .sidebar-body::-webkit-scrollbar-track { background: transparent; }
    .sidebar-body::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 4px; }

    /* ── Filter groups ── */
    .filter-group { display: flex; flex-direction: column; gap: 6px; }
    .filter-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: #80868b;
    }

    .filter-input {
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 8px;
      color: #202124;
      padding: 8px 11px;
      font-size: 13px;
      width: 100%;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .filter-input:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26,115,232,.15);
    }
    .filter-input::placeholder { color: #bdc1c6; }

    .range-row { display: flex; gap: 6px; align-items: center; }
    .range-row input { flex: 1; }
    .range-sep { color: #80868b; font-size: 11px; flex-shrink: 0; }

    /* Checkboxes */
    .check-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-height: 130px;
      overflow-y: auto;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 6px 8px;
      background: #fafafa;
    }
    .check-list::-webkit-scrollbar { width: 3px; }
    .check-list::-webkit-scrollbar-thumb { background: #dadce0; }

    .check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 3px 2px;
      border-radius: 4px;
      transition: background .1s;
    }
    .check-item:hover { background: #f1f3f4; }
    .check-item input[type=checkbox] {
      accent-color: #1a73e8;
      width: 14px; height: 14px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .check-item label {
      cursor: pointer;
      color: #3c4043;
      font-size: 12px;
      line-height: 1.4;
      user-select: none;
    }
    .no-options { color: #bdc1c6; font-size: 11px; padding: 4px 2px; }

    /* Toggle */
    .toggle-row { display: flex; align-items: center; gap: 10px; }
    .toggle { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: #dadce0;
      border-radius: 22px;
      cursor: pointer;
      transition: background .2s;
    }
    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
      box-shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    .toggle input:checked + .toggle-slider { background: #1a73e8; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }
    .toggle-label { font-size: 12px; color: #3c4043; }

    /* Botões */
    .btn-primary {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background .15s, box-shadow .15s;
      box-shadow: 0 1px 3px rgba(26,115,232,.4);
    }
    .btn-primary:hover { background: #1765cc; box-shadow: 0 2px 6px rgba(26,115,232,.4); }

    .btn-ghost {
      background: #fff;
      color: #5f6368;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
      transition: background .15s;
    }
    .btn-ghost:hover { background: #f1f3f4; }

    .result-count {
      font-size: 11px;
      color: #80868b;
      text-align: center;
      padding: 2px 0;
    }
    .result-count strong { color: #1a73e8; }

    /* ── Sidebar toggle (flutuante) ── */
    #toggle-sidebar {
      position: absolute;
      top: 50%;
      left: 300px;
      transform: translateY(-50%);
      z-index: 500;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-left: none;
      color: #5f6368;
      width: 18px; height: 52px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      border-radius: 0 8px 8px 0;
      font-size: 11px;
      transition: left .25s ease, color .15s;
      box-shadow: 2px 0 5px rgba(0,0,0,.08);
    }
    #toggle-sidebar:hover { color: #202124; }
    #toggle-sidebar.collapsed-state { left: 0; }

    /* ── Map ── */
    #map { flex: 1; z-index: 1; }

    /* ── Popup ── */
    .leaflet-popup-content-wrapper {
      background: #fff;
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.18);
      color: #202124;
      padding: 0;
    }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-content { margin: 0; min-width: 290px; max-width: 360px; }
    .leaflet-popup-close-button {
      color: #80868b !important;
      font-size: 18px !important;
      top: 10px !important; right: 12px !important;
    }
    .leaflet-popup-close-button:hover { color: #202124 !important; }

    .popup-header {
      padding: 14px 40px 12px 16px;
      border-bottom: 1px solid #e0e0e0;
      background: #f8f9fa;
      border-radius: 12px 12px 0 0;
    }
    .popup-cargo { font-size: 15px; font-weight: 700; color: #1a73e8; line-height: 1.3; }
    .popup-orgao { font-size: 11px; color: #5f6368; margin-top: 3px; }

    .popup-body { padding: 12px 16px; display: flex; flex-direction: column; gap: 7px; }

    .popup-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .popup-key { color: #80868b; font-size: 11px; flex-shrink: 0; }
    .popup-val { color: #202124; font-size: 12px; font-weight: 500; text-align: right; }

    .popup-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
    .tag {
      background: #e8eaed;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 10px;
      color: #3c4043;
      font-weight: 500;
    }
    .tag.verde  { background: #e6f4ea; color: #137333; }
    .tag.amarelo{ background: #fef7e0; color: #b06000; }
    .tag.azul   { background: #e8f0fe; color: #1a73e8; }

    .popup-footer {
      padding: 10px 16px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
    }
    .popup-link {
      flex: 1;
      text-align: center;
      background: #f8f9fa;
      border: 1px solid #dadce0;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #1a73e8;
      text-decoration: none;
      transition: background .15s;
    }
    .popup-link:hover { background: #e8f0fe; }

    /* ── Loading ── */
    #loading {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(2px);
    }
    #loading.hidden { display: none; }
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid #e0e0e0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Leaflet overrides ── */
    .leaflet-control-zoom a {
      background: #fff !important;
      color: #5f6368 !important;
      border-color: #dadce0 !important;
      font-weight: 700 !important;
    }
    .leaflet-control-zoom a:hover { background: #f1f3f4 !important; color: #202124 !important; }

    .leaflet-control-attribution { background: rgba(255,255,255,.7) !important; color: #80868b !important; }

    /* Clusters — azul Google */
    .marker-cluster-small  { background-color: rgba(26,115,232,.25); }
    .marker-cluster-small div  { background-color: rgba(26,115,232,.85); color: #fff; font-weight: 700; font-size: 12px; }
    .marker-cluster-medium { background-color: rgba(251,188,4,.25); }
    .marker-cluster-medium div { background-color: rgba(251,188,4,.9); color: #202124; font-weight: 700; font-size: 12px; }
    .marker-cluster-large  { background-color: rgba(234,67,53,.25); }
    .marker-cluster-large div  { background-color: rgba(234,67,53,.9); color: #fff; font-weight: 700; font-size: 12px; }
  </style>
</head>
<body>

<header>
  <div class="header-logo">
    <div class="header-logo-icon">C</div>
    <div>
      <h1>ConcursosIA</h1>
      <div class="subtitle">Mapa de vagas de concursos públicos</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-pill">Total: <strong id="stat-total">—</strong> vagas</div>
    <div class="stat-pill">Concursos: <strong id="stat-concursos">—</strong></div>
    <div class="stat-pill">No mapa: <strong id="stat-mapa">—</strong></div>
  </div>
</header>

<div class="body-layout">

  <aside id="sidebar">
    <div class="sidebar-header">
      <span>Filtros</span>
      <button class="btn-icon" id="btn-clear-filters" title="Limpar filtros">✕</button>
    </div>
    <div class="sidebar-body">

      <div class="filter-group">
        <div class="filter-label">Cargo</div>
        <input id="f-cargo" class="filter-input" type="text" placeholder="Ex: médico, engenheiro..." />
      </div>

      <div class="filter-group">
        <div class="filter-label">Órgão</div>
        <input id="f-orgao" class="filter-input" type="text" placeholder="Ex: Prefeitura, SAAE..." />
      </div>

      <div class="filter-group">
        <div class="filter-label">Estado (UF)</div>
        <div class="check-list" id="f-ufs"></div>
      </div>

      <div class="filter-group">
        <div class="filter-label">Nível de escolaridade</div>
        <div class="check-list" id="f-niveis"></div>
      </div>

      <div class="filter-group">
        <div class="filter-label">Regime</div>
        <div class="check-list" id="f-regimes"></div>
      </div>

      <div class="filter-group">
        <div class="filter-label">Banca organizadora</div>
        <div class="check-list" id="f-bancas"></div>
      </div>

      <div class="filter-group">
        <div class="filter-label">Salário base (R$)</div>
        <div class="range-row">
          <input id="f-sal-min" class="filter-input" type="number" placeholder="Mín" min="0" step="500" />
          <span class="range-sep">até</span>
          <input id="f-sal-max" class="filter-input" type="number" placeholder="Máx" min="0" step="500" />
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-label">Vagas mínimas no cargo</div>
        <input id="f-vagas-min" class="filter-input" type="number" placeholder="Ex: 5" min="0" />
      </div>

      <div class="filter-group">
        <div class="toggle-row">
          <label class="toggle">
            <input type="checkbox" id="f-so-abertas" />
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-label">Somente inscrições abertas</span>
        </div>
      </div>

      <div id="result-count" class="result-count" style="display:none;">
        Exibindo <strong id="count-num">0</strong> vagas
      </div>
      <button class="btn-primary" id="btn-aplicar">Aplicar filtros</button>
      <button class="btn-ghost" id="btn-limpar">Limpar tudo</button>
    </div>
  </aside>

  <div id="toggle-sidebar" title="Recolher filtros">&#9001;</div>

  <div id="map"></div>

  <div id="loading"><div class="spinner"></div></div>
</div>

<script>
const $ = id => document.getElementById(id);
const fmt = n => n > 0 ? Number(n).toLocaleString('pt-BR') : '—';
const fmtBRL = n => n > 0 ? `R$ ${Number(n).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2})}` : '—';
const fmtData = d => d ? d.split('-').reverse().join('/') : '—';
const loading = show => $('loading').classList.toggle('hidden', !show);

// ── Mapa ─────────────────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [-15.0, -52.0],
  zoom: 4,
  zoomControl: true,
  preferCanvas: true,
});

// Tiles claros CartoDB Positron (visual próximo ao Google Maps)
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> © <a href="https://carto.com">CARTO</a>',
  maxZoom: 19,
  subdomains: 'abcd',
}).addTo(map);

// ── Clusters ──────────────────────────────────────────────────────────────────
const clusterGroup = L.markerClusterGroup({
  chunkedLoading: true,
  chunkDelay: 50,
  maxClusterRadius: 60,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true,
  iconCreateFunction(cluster) {
    const count = cluster.getChildCount();
    const size = count < 10 ? 'small' : count < 100 ? 'medium' : 'large';
    return L.divIcon({
      html: `<div><span>${count > 999 ? '999+' : count}</span></div>`,
      className: `marker-cluster marker-cluster-${size}`,
      iconSize: [40, 40],
    });
  },
});
map.addLayer(clusterGroup);

// ── Ícone por nível ───────────────────────────────────────────────────────────
function nivelCor(nivel) {
  const n = (nivel || '').toLowerCase();
  if (n.includes('superior'))                        return { fill:'#1a73e8', stroke:'#0d47a1' };
  if (n.includes('técnico') || n.includes('tecnico')) return { fill:'#0f9d58', stroke:'#0a6e3e' };
  if (n.includes('médio') || n.includes('medio'))    return { fill:'#fbbc04', stroke:'#b06000' };
  return { fill:'#9e9e9e', stroke:'#616161' };
}

function criarIcone(vaga) {
  const { fill, stroke } = nivelCor(vaga.nivel_escolaridade);
  return L.divIcon({
    html: `<div style="
      width:14px;height:14px;
      background:${fill};
      border-radius:50%;
      border:2.5px solid ${stroke};
      box-shadow:0 1px 4px rgba(0,0,0,.35);
    "></div>`,
    className: '',
    iconSize: [14, 14],
    iconAnchor: [7, 7],
  });
}

// ── Popup ─────────────────────────────────────────────────────────────────────
function criarPopup(v) {
  const provas = ['prova_objetiva','prova_discursiva','prova_pratica','prova_titulos','prova_fisica']
    .filter(k => v[k])
    .map(k => ({
      prova_objetiva:'Objetiva', prova_discursiva:'Discursiva',
      prova_pratica:'Prática', prova_titulos:'Títulos', prova_fisica:'Física'
    }[k]));

  const hoje = new Date().toISOString().slice(0,10);
  const aberta = v.inscricao_fim && v.inscricao_fim >= hoje;

  const inscricao = v.inscricao_fim
    ? (v.inscricao_inicio ? `${fmtData(v.inscricao_inicio)} a ${fmtData(v.inscricao_fim)}` : `até ${fmtData(v.inscricao_fim)}`)
    : '—';

  const tags = [
    aberta !== null ? `<span class="tag ${aberta ? 'verde' : 'amarelo'}">${aberta ? 'Aberta' : 'Encerrada'}</span>` : '',
    v.nivel_escolaridade ? `<span class="tag azul">${v.nivel_escolaridade}</span>` : '',
    v.regime ? `<span class="tag">${v.regime}</span>` : '',
    v.banca ? `<span class="tag">${v.banca}</span>` : '',
  ].filter(Boolean).join('');

  const links = [
    v.url_pci    ? `<a class="popup-link" href="${v.url_pci}" target="_blank">Ver no PCI</a>` : '',
    v.url_edital ? `<a class="popup-link" href="${v.url_edital}" target="_blank">Edital</a>` : '',
  ].filter(Boolean).join('');

  const requisitos = v.requisitos && v.requisitos.length
    ? `<div style="margin-top:6px;padding-top:6px;border-top:1px solid #e0e0e0;">
        <div class="popup-key" style="margin-bottom:4px;">Requisitos</div>
        <div style="font-size:11px;color:#5f6368;line-height:1.6;">
          ${v.requisitos.slice(0,3).map(r=>`• ${r}`).join('<br>')}
          ${v.requisitos.length>3 ? `<br><span style="color:#9aa0a6;">+${v.requisitos.length-3} mais</span>` : ''}
        </div>
      </div>` : '';

  return `
  <div class="popup-header">
    <div class="popup-cargo">${v.cargo || '—'}</div>
    <div class="popup-orgao">${[v.orgao, v.uf, v.municipio].filter(Boolean).join(' · ')}</div>
  </div>
  <div class="popup-body">
    <div class="popup-row">
      <span class="popup-key">Vagas</span>
      <span class="popup-val">${fmt(v.vagas_total)}${v.cadastro_reserva ? ' <span style="color:#80868b;font-size:10px;">(+ CR)</span>' : ''}</span>
    </div>
    <div class="popup-row">
      <span class="popup-key">Salário base</span>
      <span class="popup-val">${fmtBRL(v.salario_base)}</span>
    </div>
    ${v.jornada_horas_semanais > 0 ? `<div class="popup-row">
      <span class="popup-key">Jornada</span>
      <span class="popup-val">${v.jornada_horas_semanais}h/semana</span>
    </div>` : ''}
    <div class="popup-row">
      <span class="popup-key">Inscrições</span>
      <span class="popup-val">${inscricao}</span>
    </div>
    ${v.taxa_inscricao > 0 ? `<div class="popup-row">
      <span class="popup-key">Taxa</span>
      <span class="popup-val">${fmtBRL(v.taxa_inscricao)}</span>
    </div>` : ''}
    ${provas.length ? `<div class="popup-row">
      <span class="popup-key">Provas</span>
      <span class="popup-val">${provas.join(', ')}</span>
    </div>` : ''}
    ${v.data_prova ? `<div class="popup-row">
      <span class="popup-key">Data prova</span>
      <span class="popup-val">${fmtData(v.data_prova)}</span>
    </div>` : ''}
    <div class="popup-tags">${tags}</div>
    ${requisitos}
  </div>
  ${links ? `<div class="popup-footer">${links}</div>` : ''}`;
}

// ── Renderizar marcadores ─────────────────────────────────────────────────────
function renderizarMapa(vagas) {
  clusterGroup.clearLayers();
  const markers = vagas
    .filter(v => v.lat && v.lng)
    .map(v => {
      const m = L.marker([v.lat, v.lng], { icon: criarIcone(v) });
      m.bindPopup(criarPopup(v), { maxWidth: 380 });
      return m;
    });
  clusterGroup.addLayers(markers);
  $('stat-mapa').textContent = markers.length.toLocaleString('pt-BR');
  $('count-num').textContent = markers.length.toLocaleString('pt-BR');
  $('result-count').style.display = markers.length > 0 ? 'block' : 'none';
}

// ── API calls ─────────────────────────────────────────────────────────────────
async function carregarOpcoes() {
  const data = await fetch('/api/opcoes').then(r => r.json());
  function populaCheckList(id, vals) {
    const el = $(id);
    el.innerHTML = '';
    if (!vals || !vals.length) {
      el.innerHTML = '<div class="no-options">Nenhuma opção disponível</div>';
      return;
    }
    vals.forEach(v => {
      const label = document.createElement('label');
      label.className = 'check-item';
      label.innerHTML = `<input type="checkbox" value="${v}" /><label>${v}</label>`;
      el.appendChild(label);
    });
  }
  populaCheckList('f-ufs',     data.ufs);
  populaCheckList('f-niveis',  data.niveis);
  populaCheckList('f-regimes', data.regimes);
  populaCheckList('f-bancas',  data.bancas);
}

async function carregarStats() {
  const data = await fetch('/api/stats').then(r => r.json());
  $('stat-total').textContent     = (data.total_vagas     || 0).toLocaleString('pt-BR');
  $('stat-concursos').textContent = (data.total_concursos || 0).toLocaleString('pt-BR');
}

function coletarFiltros() {
  const checkeds = id => Array.from(document.querySelectorAll(`#${id} input:checked`)).map(e=>e.value).join(',');
  return {
    cargo:       $('f-cargo').value.trim(),
    orgao:       $('f-orgao').value.trim(),
    uf:          checkeds('f-ufs'),
    nivel:       checkeds('f-niveis'),
    regime:      checkeds('f-regimes'),
    banca:       checkeds('f-bancas'),
    salario_min: $('f-sal-min').value,
    salario_max: $('f-sal-max').value,
    vagas_min:   $('f-vagas-min').value,
    so_abertas:  $('f-so-abertas').checked ? '1' : '',
    limite:      5000,
  };
}

async function buscarEAtualizar() {
  loading(true);
  try {
    const params = Object.entries(coletarFiltros()).filter(([,v]) => v !== '' && v !== null);
    const qs = new URLSearchParams(params);
    const data = await fetch(`/api/vagas?${qs}`).then(r => r.json());
    renderizarMapa(data.vagas || []);
  } catch(e) { console.error(e); }
  finally { loading(false); }
}

function limparFiltros() {
  $('f-cargo').value = ''; $('f-orgao').value = '';
  $('f-sal-min').value = ''; $('f-sal-max').value = '';
  $('f-vagas-min').value = ''; $('f-so-abertas').checked = false;
  document.querySelectorAll('.check-list input').forEach(el => el.checked = false);
  buscarEAtualizar();
}

// ── Sidebar toggle ────────────────────────────────────────────────────────────
let sidebarOpen = true;
$('toggle-sidebar').addEventListener('click', () => {
  sidebarOpen = !sidebarOpen;
  $('sidebar').classList.toggle('collapsed', !sidebarOpen);
  const btn = $('toggle-sidebar');
  btn.classList.toggle('collapsed-state', !sidebarOpen);
  btn.innerHTML = sidebarOpen ? '&#9001;' : '&#9002;';
  btn.style.left = sidebarOpen ? '300px' : '0';
  setTimeout(() => map.invalidateSize(), 280);
});

['f-cargo','f-orgao','f-sal-min','f-sal-max','f-vagas-min'].forEach(id => {
  $(id).addEventListener('keydown', e => { if (e.key==='Enter') buscarEAtualizar(); });
});
$('btn-aplicar').addEventListener('click', buscarEAtualizar);
$('btn-limpar').addEventListener('click', limparFiltros);
$('btn-clear-filters').addEventListener('click', limparFiltros);

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  loading(true);
  await Promise.all([carregarOpcoes(), carregarStats()]);
  await buscarEAtualizar();
})();
</script>
</body>
</html>
